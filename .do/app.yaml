# digitalocean app platform specification
# see: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
name: aptivo
region: nyc

services:
  - name: web
    github:
      repo: aptivo/aptivo
      branch: main
      deploy_on_push: true
    build_command: pnpm build
    run_command: pnpm start
    instance_size_slug: professional-xs
    instance_count: 1
    http_port: 3000
    health_check:
      http_path: /health/live
      initial_delay_seconds: 10
      period_seconds: 10
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET

workers:
  - name: inngest-worker
    github:
      repo: aptivo/aptivo
      branch: main
      deploy_on_push: true
    build_command: pnpm build
    run_command: pnpm run worker
    instance_size_slug: professional-xs
    # auto-scaling configuration
    instance_count: 1
    autoscaling:
      min_instance_count: 1
      max_instance_count: 4
      metrics:
        - type: CPU
          percent: 70
      # 5-minute cooldown to prevent flapping
      cooldown_period_seconds: 300
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET

databases:
  - name: aptivo-db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb

  - name: aptivo-redis
    engine: REDIS
    version: "7"
    size: db-s-1vcpu-1gb
