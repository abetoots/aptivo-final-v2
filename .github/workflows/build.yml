name: Build and Validate Artifacts

# Main branch protection workflow
# Strategy: Build Docker images and validate they start correctly
# Philosophy: Ensure only validated Docker artifacts can be deployed

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: Quick Checks (Redundant Safeguard)
  # ═══════════════════════════════════════════════════════════
  quick-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test

      # CF-02: supply-chain pre-deploy verification gate
      - name: Supply-chain verification
        run: pnpm exec tsx tools/verify-supply-chain.ts

  # ═══════════════════════════════════════════════════════════
  # Job 2: Build Docker Images (Immutable Artifacts)
  # ═══════════════════════════════════════════════════════════
  build-images:
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    outputs:
      sha-tag: ${{ github.sha }}
      image: ${{ steps.image-prefix.outputs.PREFIX }}:${{ github.sha }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ghcr.io only allows lowercase image names
      - name: Set lowercase image prefix
        id: image-prefix
        run: echo "PREFIX=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/aptivo-final-v2" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (without push)
        id: build-local
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.image-prefix.outputs.PREFIX }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image-prefix.outputs.PREFIX }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push image after scan passes
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image-prefix.outputs.PREFIX }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # generate SBOM for supply chain security
          attests: type=sbom

  # ═══════════════════════════════════════════════════════════
  # Job 3: Validate Docker Artifacts (Smoke Test)
  # ═══════════════════════════════════════════════════════════
  validate-artifacts:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ needs.build-images.outputs.image }}

      - name: Start container
        run: |
          docker run -d \
            --name aptivo-final-v2-test \
            --network host \
            -e NODE_ENV=production \
            ${{ needs.build-images.outputs.image }}

          echo "Container started. Waiting for health..."

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for service to respond..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/health/live > /dev/null 2>&1; do
            echo "Waiting for health endpoint..."
            sleep 2
          done'
          echo "✅ Container is healthy!"

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          mkdir -p logs
          docker logs aptivo-final-v2-test > logs/container.log 2>&1 || echo "Failed to get logs"

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-validation-logs
          path: logs/
          retention-days: 7

      - name: Cleanup containers
        if: always()
        run: |
          docker stop aptivo-final-v2-test || true
          docker rm aptivo-final-v2-test || true

  # ═══════════════════════════════════════════════════════════
  # Summary: What This Workflow Validates
  # ═══════════════════════════════════════════════════════════
  # ✅ Code quality (quick-checks job)
  # ✅ Docker image builds successfully (build-images job)
  # ✅ Container security scan (Trivy - critical/high CVEs)
  # ✅ Images are pushed to registry with SHA tags
  # ✅ Container starts and health check passes (validate-artifacts job)
  # ✅ SBOM generated for supply chain security
  #
  # Result:
  # - Main branch is protected
  # - SHA-tagged images are validated and ready for promotion
