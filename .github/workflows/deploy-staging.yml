name: Deploy to Staging

# staging deployment workflow
# strategy: deploy SHA-tagged images from main branch (NEVER rebuild)
# philosophy: test the exact artifact that will go to production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (must have passed build.yml)"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set lowercase image prefix
        id: image-prefix
        run: echo "PREFIX=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/aptivo-final-v2" >> $GITHUB_OUTPUT

      - name: Resolve SHA
        id: resolve
        run: |
          SHA=${{ inputs.sha }}
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      # verify build.yml succeeded for this SHA
      - name: Verify build.yml success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=${{ steps.resolve.outputs.sha }}
          echo "Verifying build.yml success for SHA: $SHA"

          STATUS=$(gh run list --commit "$SHA" --workflow "build.yml" --json conclusion --jq '.[0].conclusion // "not_found"')

          if [ "$STATUS" != "success" ]; then
            echo "❌ No successful build.yml run for SHA $SHA (status: $STATUS)"
            exit 1
          fi
          echo "✅ Build validation confirmed"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in registry
        run: |
          SHA=${{ steps.resolve.outputs.sha }}
          docker manifest inspect ${{ steps.image-prefix.outputs.PREFIX }}:$SHA
          echo "✅ Image verified"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Staging (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --environment staging --detach

      - name: Summary
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ steps.resolve.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.image-prefix.outputs.PREFIX }}:${{ steps.resolve.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════
# Usage:
# - Manual: Actions → Deploy to Staging → Enter SHA → Run
# ═══════════════════════════════════════════════════════════
