name: Infrastructure Drift Detection

on:
  schedule:
    # run weekly on monday at 08:00 utc
    - cron: '0 8 * * 1'
  workflow_dispatch: # allow manual trigger

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Export live config
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway status --json > /tmp/live-config.json

      - name: Run drift check
        id: drift
        run: |
          chmod +x scripts/drift-check.sh
          scripts/drift-check.sh railway.json /tmp/live-config.json > /tmp/drift-report.txt 2>&1
          if [ -s /tmp/drift-report.txt ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "report<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/drift-report.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.drift.outputs.report }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 Infrastructure Drift Detected - ${new Date().toISOString().split('T')[0]}`,
              body: `## Infrastructure Drift Report\n\n${report}\n\n---\n*Generated by drift-detection workflow*`,
              labels: ['infrastructure', 'drift']
            });
