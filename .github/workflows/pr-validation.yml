name: PR Validation

# Fast feedback workflow for pull requests
# Strategy: Test source code with lint, typecheck, and unit tests
# Philosophy: Catch errors early without expensive builds

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: Validate Code Quality and Business Logic
  # ═══════════════════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test

      # ═══════════════════════════════════════════════════════════
      # Security Scans
      # ═══════════════════════════════════════════════════════════
      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run npm audit
        run: pnpm audit --audit-level=critical
        continue-on-error: false  # block on critical vulnerabilities

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-logs
          path: |
            **/logs/**
            **/*.log
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════
  # Summary: What This Workflow Validates
  # ═══════════════════════════════════════════════════════════
  # ✅ Code quality (lint, types)
  # ✅ Business logic (unit tests)
  # ✅ Security (secrets scanning, dependency audit)
  #
  # Benefits:
  # - Fast feedback for most failures
  # - Developers stay in flow
  # - Security issues caught early
  # - Only validated code proceeds to main branch
