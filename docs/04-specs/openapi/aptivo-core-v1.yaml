              $ref: '#/components/schemas/DomainRoleCreateRequest'
      responses:
        '201':
          description: Domain role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRole'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/domains/{domain}/roles/{roleId}:
    get:
      tags: [Domains]
      summary: Get domain role
      operationId: getDomainRole
      parameters:
        - $ref: '#/components/parameters/DomainParam'
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '200':
          description: Domain role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRole'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
