openapi: 3.1.0
info:
  title: Aptivo Platform Core API
  description: |
    Domain-agnostic workflow automation platform API.

    ## Authentication
    All endpoints (except health checks) require a valid Supabase JWT in the `Authorization: Bearer` header.
    Authorization is handled via database role lookup linked to the authenticated user ID.

    ## Pagination
    All list endpoints use cursor-based pagination with `cursor` and `limit` parameters.
    - Default limit: 50
    - Maximum limit: 200
    - Response includes `next_cursor` (null when no more results) and `has_more` boolean.

    ## Error Responses
    All errors follow RFC 7807 Problem Details with extensions for machine-readable codes.

    ## Idempotency
    Critical state-changing operations (HITL decisions, trades, money movement) require an `Idempotency-Key` header.

    ## Global Request Limits
    All API endpoints enforce the following limits:
    - **Maximum request body size**: 1 MiB (1,048,576 bytes). Requests exceeding this limit receive `413 Payload Too Large`.
    - **Maximum JSON nesting depth**: 10 levels. Requests exceeding this limit receive `400 Bad Request`.

    ## Rate Limits
    Rate limits are enforced per endpoint to ensure fair usage and platform stability:
    - `POST /auth/magic-link`: 5 requests per minute per email
    - `POST /api/v1/hitl/:id/approve`: 10 requests per minute per user
    - `POST /api/v1/hitl/:id/reject`: 10 requests per minute per user
    - `GET /api/v1/workflows`: 100 requests per minute per user
    - `POST /api/v1/workflows`: 20 requests per minute per user
    - `POST /api/v1/webhooks/inbound/:sourceId`: 100 requests per minute per source
    - All other authenticated endpoints: 100 requests per minute per user

    All rate-limited responses include `X-RateLimit-Limit`, `X-RateLimit-Remaining`, and `X-RateLimit-Reset` headers.
    Exceeding a rate limit returns `429 Too Many Requests` with a `Retry-After` header.
  version: 1.0.0
  contact:
    name: Aptivo Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.aptivo.io
    description: Production
  - url: https://api.staging.aptivo.io
    description: Staging

tags:
  - name: Health
    description: Health check endpoints (no auth required)
  - name: HITL
    description: Human-in-the-Loop approval gateway
  - name: Workflows
    description: Workflow definition and instance management
  - name: Audit
    description: Audit log querying and export
  - name: Files
    description: File storage with presigned URLs
  - name: Webhooks
    description: Webhook configuration management
  - name: Identity
    description: Authentication and user management
  - name: Domains
    description: Domain role management

# ==============================================================================
# PATHS
# ==============================================================================
paths:
  # ============================================================================
  # HEALTH CHECKS (No Auth)
  # ============================================================================
  /health/live:
    get:
      tags: [Health]
      summary: Liveness check
      description: Returns basic health status. Used by load balancers and DO App Platform for liveness probes.
      operationId: getHealthLive
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness check
      description: Returns readiness status including dependency health. Used for readiness probes.
      operationId: getHealthReady
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service is not ready (dependencies unhealthy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  # ============================================================================
  # HITL GATEWAY
  # ============================================================================
  /api/v1/hitl:
    get:
      tags: [HITL]
      summary: List pending HITL requests
      description: Returns paginated list of HITL approval requests for the authenticated user.
      operationId: listHitlRequests
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired, changes_requested]
        - name: domain
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of HITL requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HitlRequestSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/hitl/{requestId}:
    get:
      tags: [HITL]
      summary: Get HITL request details
      operationId: getHitlRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdParam'
      responses:
        '200':
          description: HITL request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HitlRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/hitl/{requestId}/approve:
    post:
      tags: [HITL]
      summary: Approve HITL request
      description: |
        Approve a pending HITL request. Requires both user authentication (Bearer JWT)
        and a valid HITL action token in the request body.
      operationId: approveHitlRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdParam'
        - $ref: '#/components/parameters/IdempotencyKeyRequiredParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HitlDecisionRequest'
      responses:
        '200':
          description: |
            Request approved successfully. Also returned for idempotent duplicate approvals
            (response includes `idempotent: true` flag per ADD §4.5.1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HitlDecisionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflicting decision — request was already resolved with a different action (e.g., trying to approve after rejection)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Request has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/hitl/{requestId}/reject:
    post:
      tags: [HITL]
      summary: Reject HITL request
      operationId: rejectHitlRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdParam'
        - $ref: '#/components/parameters/IdempotencyKeyRequiredParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HitlDecisionRequest'
      responses:
        '200':
          description: |
            Request rejected successfully. Also returned for idempotent duplicate rejections
            (response includes `idempotent: true` flag per ADD §4.5.1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HitlDecisionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflicting decision — request was already resolved with a different action (e.g., trying to reject after approval)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Request has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/hitl/{requestId}/request-changes:
    post:
      tags: [HITL]
      summary: Request changes on HITL request
      description: Request additional information from the submitter before making a decision.
      operationId: requestChangesHitl
      parameters:
        - $ref: '#/components/parameters/RequestIdParam'
        - $ref: '#/components/parameters/IdempotencyKeyRequiredParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/HitlDecisionRequest'
                - type: object
                  properties:
                    feedback:
                      type: string
                      description: Feedback message explaining what changes are needed
                      maxLength: 2000
                  required: [feedback]
      responses:
        '200':
          description: Changes requested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HitlDecisionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Decision already recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Request has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ============================================================================
  # WORKFLOWS
  # ============================================================================
  /api/v1/workflows:
    get:
      tags: [Workflows]
      summary: List workflow definitions
      operationId: listWorkflows
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: domain
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [enabled, disabled]
      responses:
        '200':
          description: List of workflow definitions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Workflows]
      summary: Create workflow definition
      operationId: createWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workflows/validate:
    post:
      tags: [Workflows]
      summary: Validate workflow definition
      description: Validates a workflow definition without creating it. Returns validation errors and warnings.
      operationId: validateWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workflows/{workflowId}:
    get:
      tags: [Workflows]
      summary: Get workflow definition
      operationId: getWorkflow
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
      responses:
        '200':
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Workflows]
      summary: Update workflow definition
      operationId: updateWorkflow
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowUpdateRequest'
      responses:
        '200':
          description: Workflow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Workflows]
      summary: Delete workflow definition
      description: |
        Permanently deletes a workflow definition. Only allowed if no active instances exist.
        Requires admin or user role with workflow delete permission.
      operationId: deleteWorkflow
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
      responses:
        '204':
          description: Workflow deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — workflow has active instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/v1/workflows/{workflowId}/export:
    get:
      tags: [Workflows]
      summary: Export workflow definition
      description: Export workflow definition in portable JSON format.
      operationId: exportWorkflow
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
      responses:
        '200':
          description: Exported workflow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowExport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/workflows/{workflowId}/instances:
    get:
      tags: [Workflows]
      summary: List workflow instances
      operationId: listWorkflowInstances
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [running, completed, failed, suspended, timed_out]
          description: Filter by execution status
        - name: createdAfter
          in: query
          schema:
            type: string
            format: date-time
          description: Filter instances created after this timestamp (ISO 8601)
        - name: createdBefore
          in: query
          schema:
            type: string
            format: date-time
          description: Filter instances created before this timestamp (ISO 8601)
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by the user who triggered the workflow instance
      responses:
        '200':
          description: List of workflow instances
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowInstanceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/workflows/{workflowId}/instances/{instanceId}:
    get:
      tags: [Workflows]
      summary: Get workflow instance details
      operationId: getWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
        - $ref: '#/components/parameters/InstanceIdParam'
      responses:
        '200':
          description: Workflow instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/workflows/{workflowId}/instances/{instanceId}/history:
    get:
      tags: [Workflows]
      summary: Get workflow instance execution history
      operationId: getWorkflowInstanceHistory
      parameters:
        - $ref: '#/components/parameters/WorkflowIdParam'
        - $ref: '#/components/parameters/InstanceIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Execution history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowHistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # AUDIT
  # ============================================================================
  /api/v1/audit/logs:
    get:
      tags: [Audit]
      summary: Query audit logs
      operationId: queryAuditLogs
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - name: actor
          in: query
          description: Filter by actor ID (user or system)
          schema:
            type: string
        - name: entityType
          in: query
          description: Filter by entity type (e.g., workflow, hitl_request)
          schema:
            type: string
        - name: action
          in: query
          description: Filter by action (e.g., created, updated, deleted)
          schema:
            type: string
        - name: domain
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLogEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/audit/exports:
    post:
      tags: [Audit]
      summary: Request audit log export
      description: Request an asynchronous export of audit logs. Returns an export ID to check status.
      operationId: requestAuditExport
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditExportRequest'
      responses:
        '202':
          description: Export request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/audit/exports/{exportId}:
    get:
      tags: [Audit]
      summary: Get audit export status
      operationId: getAuditExportStatus
      parameters:
        - name: exportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Export status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # FILES
  # ============================================================================
  /api/v1/files/upload-url:
    post:
      tags: [Files]
      summary: Generate presigned upload URL
      operationId: generateUploadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/files/{fileId}:
    get:
      tags: [Files]
      summary: Get file metadata
      operationId: getFileMetadata
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Files]
      summary: Delete file
      operationId: deleteFile
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '204':
          description: File deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/files/{fileId}/download-url:
    post:
      tags: [Files]
      summary: Generate presigned download URL
      operationId: generateDownloadUrl
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/files/{fileId}/link:
    post:
      tags: [Files]
      summary: Link file to entity
      description: Associate a file with a business entity (e.g., workflow instance, HITL request).
      operationId: linkFileToEntity
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileLinkRequest'
      responses:
        '200':
          description: File linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # WEBHOOKS
  # ============================================================================
  /api/v1/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook configurations
      operationId: listWebhooks
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: event
          in: query
          description: Filter by event type
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of webhook configurations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WebhookConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Webhooks]
      summary: Create webhook configuration
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/webhooks/{webhookId}:
    get:
      tags: [Webhooks]
      summary: Get webhook configuration
      operationId: getWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookIdParam'
      responses:
        '200':
          description: Webhook configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Webhooks]
      summary: Update webhook configuration
      operationId: updateWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateRequest'
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Webhooks]
      summary: Delete webhook configuration
      operationId: deleteWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookIdParam'
      responses:
        '204':
          description: Webhook deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/webhooks/inbound/{sourceId}:
    post:
      tags: [Webhooks]
      summary: Receive inbound webhook
      description: |
        Endpoint for receiving webhooks from external systems.
        Requires signature verification via X-Webhook-Signature header.
      operationId: receiveInboundWebhook
      security: []  # uses signature verification instead of JWT
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Registered webhook source ID
          schema:
            type: string
            format: uuid
        - name: X-Webhook-Signature
          in: header
          required: true
          description: HMAC signature for verification
          schema:
            type: string
        - name: X-Webhook-ID
          in: header
          description: |
            Unique webhook event ID for deduplication.
            **At least one of X-Webhook-ID, X-Request-ID, or body.id/body.event_id is required for deduplication.**
          schema:
            type: string
        - name: X-Request-ID
          in: header
          description: |
            Alternative to X-Webhook-ID for deduplication (used by some providers).
            Falls back to body.id or body.event_id if neither header is present.
          schema:
            type: string
        - name: X-Webhook-Timestamp
          in: header
          description: Event timestamp for replay protection
          schema:
            type: string
            format: date-time
      requestBody:
        required: true
        description: >
          Inbound webhook payload from external system.
          Request body must not exceed 1 MiB (1,048,576 bytes).
          Requests exceeding this limit are rejected with 413 Payload Too Large.
        x-body-size-limit: 1048576
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook received and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  eventId:
                    type: string
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Unknown webhook source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  # ============================================================================
  # IDENTITY / AUTH
  # ============================================================================
  /api/v1/auth/magic-link:
    post:
      tags: [Identity]
      summary: Send magic link
      description: Send a passwordless login link to the specified email.
      operationId: sendMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                redirectTo:
                  type: string
                  format: uri
                  description: URL to redirect after successful login
              required: [email]
      responses:
        '200':
          description: Magic link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/callback:
    post:
      tags: [Identity]
      summary: Handle auth callback
      description: Exchange auth code/token for session.
      operationId: handleAuthCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Authorization code from OAuth or magic link
                provider:
                  type: string
                  enum: [magic_link, google, github]
              required: [code]
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/v1/auth/user:
    get:
      tags: [Identity]
      summary: Get current user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Identity]
      summary: Logout
      operationId: logout
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users:
    get:
      tags: [Identity]
      summary: List users (admin)
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
        - name: domain
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}/roles:
    get:
      tags: [Identity]
      summary: Get user roles
      operationId: getUserRoles
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoles'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Identity]
      summary: Assign roles to user
      operationId: assignUserRoles
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignmentRequest'
      responses:
        '200':
          description: Roles assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoles'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # DOMAIN ROLES
