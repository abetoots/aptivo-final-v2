          application/json:
            schema:
              $ref: '#/components/schemas/DomainRoleUpdateRequest'
      responses:
        '200':
          description: Domain role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRole'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
