        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Domains]
      summary: Create domain role
      operationId: createDomainRole
      parameters:
        - $ref: '#/components/parameters/DomainParam'
      requestBody:
        required: true
