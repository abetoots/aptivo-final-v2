        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '204':
          description: Domain role deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:
  # ============================================================================
  # SECURITY SCHEMES
  # ============================================================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token

  # ============================================================================
  # PARAMETERS
  # ============================================================================
  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Opaque cursor for pagination (from previous response)
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: Number of items to return (default 50, max 200)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    IdempotencyKeyParam:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Unique key for idempotent operations. Must be unique per logical operation.
        **Required** for critical operations: HITL decisions (approve/reject/request-changes).
        **Recommended** for other mutating operations.
      schema:
        type: string
        minLength: 16
        maxLength: 128

    IdempotencyKeyRequiredParam:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key for idempotent operations. Must be unique per logical operation.
        This header is **required** for this operation.
      schema:
        type: string
        minLength: 16
        maxLength: 128

    RequestIdParam:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    WorkflowIdParam:
      name: workflowId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    InstanceIdParam:
      name: instanceId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    FileIdParam:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    WebhookIdParam:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    DomainParam:
      name: domain
      in: path
      required: true
      description: Domain identifier (e.g., 'hr', 'crypto')
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_-]{1,30}$'

    RoleIdParam:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ============================================================================
  # RESPONSES
  # ============================================================================
  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'

    Unauthorized:
      description: Unauthorized - invalid or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  # ============================================================================
  # HEADERS
  # ============================================================================
  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed per rate limit window
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Remaining requests in current window
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp when the rate limit window resets
      schema:
        type: integer
    Retry-After:
      description: Seconds until the rate limit resets (included in 429 responses)
      schema:
        type: integer

  # ============================================================================
  # SCHEMAS
  # ============================================================================
  schemas:
    # --------------------------------------------------------------------------
    # COMMON
    # --------------------------------------------------------------------------
    ProblemDetails:
      type: object
      description: RFC 7807 Problem Details with extensions
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type
          example: /errors/validation
        title:
          type: string
          description: Short human-readable summary
          example: Validation Error
        status:
          type: integer
          description: HTTP status code
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
        instance:
          type: string
          format: uri
          description: URI reference to the specific occurrence
        code:
          type: string
          description: Machine-readable error code (UPPER_SNAKE_CASE)
          example: VALIDATION_FAILED
        traceId:
          type: string
          description: OpenTelemetry trace ID for correlating this error with server-side traces
          example: "4bf92f3577b34da6a3ce929d0e0e4736"
        errors:
          type: array
          description: Field-level validation errors
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email format
              code:
                type: string
                example: INVALID_FORMAT
            required: [field, message, code]
      required: [type, title, status, code]

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        next_cursor:
          type: string
          nullable: true
          description: Cursor for next page, null if no more results
        has_more:
          type: boolean
          description: Whether there are more results
      required: [data, next_cursor, has_more]

    # --------------------------------------------------------------------------
    # HEALTH
    # --------------------------------------------------------------------------
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
        uptime:
          type: integer
          description: Uptime in seconds
      required: [status, version, timestamp, uptime]

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: postgres
              status:
                type: string
                enum: [up, down]
              latencyMs:
                type: integer
              message:
                type: string
            required: [name, status, latencyMs]
        timestamp:
          type: string
          format: date-time
      required: [status, checks, timestamp]

    # --------------------------------------------------------------------------
    # HITL
    # --------------------------------------------------------------------------
    HitlRequestSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        workflowName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, expired, changes_requested]
        requestedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        domain:
          type: string
        summary:
          type: string
          description: Brief description of what needs approval
      required: [id, workflowId, status, requestedAt, expiresAt]

    HitlRequest:
      allOf:
        - $ref: '#/components/schemas/HitlRequestSummary'
        - type: object
          properties:
            workflowInstanceId:
              type: string
              format: uuid
            stepId:
              type: string
            context:
              type: object
              additionalProperties: true
              description: Context data for the approval decision
            approvers:
              type: array
              items:
                type: string
                format: uuid
              description: List of user IDs who can approve
            decision:
              type: object
              nullable: true
              properties:
                action:
                  type: string
                  enum: [approved, rejected, changes_requested]
                decidedBy:
                  type: string
                  format: uuid
                decidedAt:
                  type: string
                  format: date-time
                comment:
                  type: string

    HitlDecisionRequest:
      type: object
      properties:
        token:
          type: string
          description: Signed HITL action token
        comment:
          type: string
          maxLength: 2000
          description: Optional comment explaining the decision
      required: [token]

    HitlDecisionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [approved, rejected, changes_requested]
        decidedAt:
          type: string
          format: date-time
        message:
          type: string
      required: [id, status, decidedAt]

    # --------------------------------------------------------------------------
    # WORKFLOWS
    # --------------------------------------------------------------------------
    WorkflowSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [enabled, disabled]
        domain:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, version, status]

    Workflow:
      allOf:
        - $ref: '#/components/schemas/WorkflowSummary'
        - type: object
          properties:
            description:
              type: string
            states:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowState'
            triggers:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowTrigger'

    WorkflowState:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [initial, intermediate, final]
        transitions:
          type: array
          items:
            type: string
        onEnter:
          type: array
          items:
            type: string
        onExit:
          type: array
          items:
            type: string
      required: [name, type]

    WorkflowTrigger:
      type: object
      properties:
        type:
          type: string
          enum: [webhook, schedule, event, manual]
        config:
          type: object
          additionalProperties: true
      required: [type]

    WorkflowCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        domain:
          type: string
        states:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowState'
          minItems: 1
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTrigger'
      required: [name, states]

    WorkflowUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        status:
          type: string
          enum: [enabled, disabled]
        states:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowState'
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTrigger'

    WorkflowValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
              code:
                type: string
            required: [path, message, code]
        warnings:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
              code:
                type: string
            required: [path, message, code]
      required: [valid, errors, warnings]

    WorkflowExport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        name:
          type: string
        status:
          type: string
        states:
          type: array
          items:
            type: object
        triggers:
          type: array
          items:
            type: object
        exportedAt:
          type: string
          format: date-time
      required: [id, version, name, status, states, triggers, exportedAt]

    WorkflowInstanceSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        status:
          type: string
          enum: [running, completed, failed, suspended]
        currentState:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, workflowId, status, currentState, startedAt]

    WorkflowInstance:
      allOf:
        - $ref: '#/components/schemas/WorkflowInstanceSummary'
        - type: object
          properties:
            input:
              type: object
              additionalProperties: true
            output:
              type: object
              additionalProperties: true
              nullable: true
            error:
              type: object
              nullable: true
              properties:
                message:
                  type: string
                code:
                  type: string
                stepId:
                  type: string

    WorkflowHistoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        eventType:
          type: string
          enum: [state_entered, state_exited, action_started, action_completed, action_failed, suspended, resumed]
        state:
          type: string
        stepId:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [id, timestamp, eventType]

    # --------------------------------------------------------------------------
    # AUDIT
    # --------------------------------------------------------------------------
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        actor:
          type: object
          properties:
            type:
              type: string
              enum: [user, system, workflow]
            id:
              type: string
            name:
              type: string
          required: [type, id]
        action:
          type: string
          example: created
        entityType:
          type: string
          example: workflow
        entityId:
          type: string
        domain:
          type: string
        changes:
          type: object
          additionalProperties: true
          description: Before/after values for update operations
        metadata:
          type: object
          additionalProperties: true
      required: [id, timestamp, actor, action, entityType, entityId]

    AuditExportRequest:
      type: object
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        filters:
          type: object
          properties:
            actor:
              type: string
            entityType:
              type: string
            action:
              type: string
            domain:
              type: string
        format:
          type: string
          enum: [json, csv, pdf]
          default: json
      required: [startTime, endTime]

    AuditExportStatus:
      type: object
      properties:
        exportId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        format:
          type: string
          enum: [json, csv, pdf]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        downloadUrl:
          type: string
          format: uri
          nullable: true
          description: Presigned URL to download export (available when completed)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When the download URL expires
        checksumSha256:
          type: string
          nullable: true
          description: SHA-256 hash of the export file for integrity verification (available when completed)
          example: "a1b2c3d4e5f6..."
        error:
          type: string
          nullable: true
      required: [exportId, status, format, createdAt]

    # --------------------------------------------------------------------------
    # FILES
    # --------------------------------------------------------------------------
    UploadUrlRequest:
      type: object
      properties:
        filename:
          type: string
          maxLength: 255
        contentType:
          type: string
          example: application/pdf
        size:
          type: integer
          description: File size in bytes
          maximum: 52428800  # 50MB (matches FRD §8.5 FR-CORE-BLOB-001 default)
        metadata:
          type: object
          additionalProperties:
            type: string
      required: [filename, contentType]

    PresignedUrlResponse:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        method:
          type: string
          enum: [PUT, GET]
        headers:
          type: object
          additionalProperties:
            type: string
          description: Required headers for the presigned request
      required: [fileId, url, expiresAt, method]

    FileMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        uploadedBy:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, uploaded, clean, quarantined, error]
          description: >
            Upload lifecycle: pending (URL generated) → uploaded (received, scan queued) →
            clean (scan passed, downloadable) | quarantined (infected, blocked) | error (scan failed).
            Aligns with ADD §9.8 scanStatus values.
        linkedEntities:
          type: array
          items:
            type: object
            properties:
              entityType:
                type: string
              entityId:
                type: string
        metadata:
          type: object
          additionalProperties:
            type: string
      required: [id, filename, contentType, size, uploadedAt, status]

    FileLinkRequest:
      type: object
      properties:
        entityType:
          type: string
          example: workflow_instance
        entityId:
          type: string
          format: uuid
      required: [entityType, entityId]

    # --------------------------------------------------------------------------
    # WEBHOOKS
    # --------------------------------------------------------------------------
    WebhookConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          description: Event types this webhook subscribes to
        active:
          type: boolean
        secret:
          type: string
          description: Secret for HMAC signature (write-only, not returned in GET)
          writeOnly: true
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers to include in webhook requests
        retryPolicy:
          type: object
          properties:
            maxRetries:
              type: integer
              minimum: 0
              maximum: 10
            backoffMultiplier:
              type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, url, events, active]

    WebhookEventPayload:
      type: object
      description: |
        Standard envelope for all outbound webhook event payloads.
        Consumers MUST ignore unknown fields in the `data` object (forward compatibility).
        See ADD §12.2.3 for per-event-type data schemas.
      properties:
        id:
          type: string
          description: Unique event ID (same as X-Webhook-ID header, for deduplication)
        event:
          type: string
          description: Event type
          enum:
            - workflow.completed
            - workflow.failed
            - hitl.requested
            - hitl.approved
            - hitl.rejected
            - entity.created
            - entity.updated
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 event timestamp
        workflowId:
          type: string
          format: uuid
          description: Originating workflow ID
        data:
          type: object
          additionalProperties: true
          description: Event-specific payload (schema varies by event type, see ADD §12.2.3)
      required: [id, event, timestamp, workflowId, data]

    WebhookCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          minItems: 1
        secret:
          type: string
          minLength: 32
          description: Secret for HMAC signature verification
        headers:
          type: object
          additionalProperties:
            type: string
        retryPolicy:
          type: object
          properties:
            maxRetries:
              type: integer
              minimum: 0
              maximum: 10
              default: 3
            backoffMultiplier:
              type: number
              default: 2
      required: [name, url, events, secret]

    WebhookUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          minItems: 1
        active:
          type: boolean
        secret:
          type: string
          minLength: 32
        headers:
          type: object
          additionalProperties:
            type: string
        retryPolicy:
          type: object
          properties:
            maxRetries:
              type: integer
              minimum: 0
              maximum: 10
            backoffMultiplier:
              type: number

    # --------------------------------------------------------------------------
    # IDENTITY
    # --------------------------------------------------------------------------
    AuthSession:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
      required: [accessToken, expiresAt, user]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
        coreRoles:
          type: array
          items:
            type: string
          description: Platform-level roles
        domainRoles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Domain-specific roles keyed by domain
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
      required: [id, email, coreRoles, domainRoles]

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        coreRoles:
          type: array
          items:
            type: string
        lastLoginAt:
          type: string
          format: date-time
      required: [id, email, coreRoles]

    UserRoles:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        coreRoles:
          type: array
          items:
            type: string
        domainRoles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [userId, coreRoles, domainRoles]

    RoleAssignmentRequest:
      type: object
      properties:
        coreRoles:
          type: array
          items:
            type: string
          description: Core roles to assign (replaces existing)
        domainRoles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Domain roles to assign keyed by domain

    # --------------------------------------------------------------------------
    # DOMAIN ROLES
    # --------------------------------------------------------------------------
    DomainRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
        domain:
          type: string
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
          description: List of permission strings
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, domain, name, permissions]

    DomainRoleCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-z][a-z0-9_-]*$'
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
          minItems: 1
      required: [name, permissions]

    DomainRoleUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-z][a-z0-9_-]*$'
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
          minItems: 1

# ==============================================================================
# DEFAULT SECURITY
# ==============================================================================
security:
  - BearerAuth: []
